name: Deploy

on:
  push:
    branches:
      - main

concurrency:

  group: production-deploy

  cancel-in-progress: true

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1 

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            cd /opt/merkado
            ./scripts/deploy.sh